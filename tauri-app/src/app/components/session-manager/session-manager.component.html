<div class="glass-card p-4 flex flex-col h-full max-h-[600px]">
  <div class="flex justify-between items-center mb-4 pb-3 border-b-2 border-white/20">
    <h3 class="m-0 text-lg font-semibold text-white/90">💬 Chat Sessions</h3>
    <div class="flex gap-2">
      <button
        class="px-3 py-1.5 rounded-lg border-2 border-white/30 bg-white/15 hover:bg-green-500/30 hover:border-green-500/50 transition-all text-base cursor-pointer"
        (click)="handleCreateSession()"
        title="New Session"
        aria-label="Create new session"
      >
        ➕
      </button>
      <button
        *ngIf="sessions.length > 0"
        class="px-3 py-1.5 rounded-lg border-2 border-white/30 bg-white/15 hover:bg-red-500/30 hover:border-red-500/50 transition-all text-base cursor-pointer"
        (click)="handleClearAll()"
        title="Clear All"
        aria-label="Clear all sessions"
      >
        🗑️
      </button>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto flex flex-col gap-2 pr-1">
    <div *ngIf="sessions.length === 0" class="flex flex-col items-center justify-center h-full text-white/70 text-center p-8">
      <p class="m-0 mb-4 italic">No sessions yet</p>
      <button
        class="px-6 py-3 rounded-lg border-2 border-primary-400/60 bg-primary-400/40 hover:bg-primary-400/60 hover:-translate-y-0.5 hover:shadow-lg transition-all text-white font-semibold cursor-pointer shadow-md"
        (click)="handleCreateSession()"
      >
        Create First Session
      </button>
    </div>

    <div
      *ngFor="let session of sessions; trackBy: trackBySessionId"
      class="bg-black/30 border-2 border-white/20 rounded-lg p-3 cursor-pointer transition-all flex justify-between items-start gap-2 hover:bg-black/40 hover:border-white/35 hover:shadow-md"
      [ngClass]="{'bg-primary-400/20 border-primary-400/50': session.id === activeSessionId}"
      (click)="handleSelectSession(session.id)"
    >
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-white/90 mb-1 text-sm truncate">{{ session.title }}</div>
        <div class="text-xs text-white/60 mb-1 truncate">{{ getSessionPreview(session) }}</div>
        <div class="flex gap-3 text-xs text-white/50">
          <span>{{ formatDate(session.updated_at) }}</span>
          <span>{{ session.messages.length }} msgs</span>
        </div>
      </div>
      <button
        class="bg-transparent border-0 text-white/40 hover:text-red-500 cursor-pointer p-1 text-base transition-colors flex-shrink-0"
        (click)="handleDeleteSession(session.id, $event)"
        title="Delete Session"
        aria-label="Delete session"
      >
        ✕
      </button>
    </div>
  </div>

</div>
