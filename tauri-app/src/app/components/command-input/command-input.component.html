<div class="command-input-container">
  <h2>💬 Command Input</h2>
  <form (ngSubmit)="handleSubmit($event)" class="command-form">
    <textarea
      [(ngModel)]="input"
      name="commandInput"
      placeholder="Describe what you want to create in Godot...&#10;&#10;Example: Add a 2D player character with a sprite and collision shape"
      [disabled]="disabled"
      rows="4"
      class="command-textarea"
    ></textarea>
    <button type="submit" [disabled]="disabled || !input.trim()" class="submit-button">
      {{ disabled ? '⏸ Not Ready' : '🚀 Execute' }}
    </button>
  </form>
  <p *ngIf="disabled" class="warning-text">
    ⚠️ Please configure your API key and ensure Godot is connected
  </p>
</div>
