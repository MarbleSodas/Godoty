<div class="flex flex-col gap-3">
  <!-- Knowledge Base Status Card -->
  <div class="glass-card p-3">
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
        <span class="text-white/70 text-sm font-medium">📚 Godot Docs KB</span>
      </div>
      <button 
        (click)="handleRebuild()" 
        [disabled]="isRebuilding || !status?.initialized"
        class="px-2 py-1 rounded bg-white/10 text-white border border-white/20 hover:bg-white/15 disabled:opacity-50 text-xs"
      >
        {{ isRebuilding ? 'Rebuilding...' : 'Rebuild' }}
      </button>
    </div>

    <!-- Status Display -->
    <div class="flex items-center gap-2 mb-2">
      <span class="text-lg">{{ getStatusIcon() }}</span>
      <span class="text-sm" [class]="getStatusColor()">
        {{ getStatusText() }}
      </span>
    </div>

    <!-- View Documents Button -->
    <button
      *ngIf="status?.initialized && (status?.docs_kb_count ?? 0) > 0"
      (click)="toggleDocuments()"
      class="w-full px-3 py-1.5 rounded bg-white/5 text-white/80 border border-white/10 hover:bg-white/10 text-xs"
    >
      {{ showDocuments ? 'Hide Documents' : 'View Documents' }}
    </button>

    <!-- Loading animation for Rebuilding state -->
    <div *ngIf="isRebuilding" class="mt-2">
      <div class="w-full bg-white/10 rounded-full h-1.5">
        <div class="bg-blue-400 h-1.5 rounded-full animate-pulse" style="width: 100%"></div>
      </div>
    </div>
  </div>

  <!-- Documents List -->
  <div *ngIf="showDocuments && documents.length > 0" class="glass-card p-3 max-h-96 overflow-y-auto">
    <h3 class="text-white/90 font-medium mb-3 text-sm">Documentation Entries</h3>
    <div class="space-y-3">
      <div 
        *ngFor="let doc of documents" 
        class="bg-white/5 rounded p-3 border border-white/10"
      >
        <div class="flex items-start justify-between mb-2">
          <span class="text-white/90 font-medium text-sm">{{ doc.id }}</span>
          <span class="text-white/50 text-xs">
            {{ formatTimestamp(doc.created_at) }}
          </span>
        </div>
        
        <p class="text-white/70 text-xs mb-2 whitespace-pre-wrap">
          {{ truncateContent(doc.content) }}
        </p>
        
        <div *ngIf="doc.metadata && Object.keys(doc.metadata).length > 0" class="flex flex-wrap gap-1">
          <span 
            *ngFor="let key of Object.keys(doc.metadata)" 
            class="px-2 py-0.5 bg-blue-500/20 text-blue-300 rounded text-xs"
          >
            {{ key }}: {{ doc.metadata[key] }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="showDocuments && documents.length === 0" class="glass-card p-4 text-center">
    <p class="text-white/50 text-sm">No documents found</p>
  </div>
</div>
