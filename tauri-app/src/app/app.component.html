<div class="app-container">
  <header class="app-header">
    <div class="header-left">
      <h1>🎮 Godoty AI Assistant</h1>
    </div>
    <div class="header-controls">
      <app-status-panel [status]="connectionStatus"></app-status-panel>
    </div>
  </header>

  <main class="app-main">
    <div class="left-panel">
      <!-- Chat View with Integrated Input -->
      <app-chat-view
        [session]="activeSession"
        [isProcessing]="isProcessing"
        [processingStatus]="processingStatus"
        [disabled]="connectionStatus !== 'connected' || !apiKey || !projectPath || isProcessing"
        (submitCommand)="handleCommandSubmit($event)"
      ></app-chat-view>
    </div>

    <div class="right-panel">
      <app-session-manager
        [sessions]="chatSessions"
        [activeSessionId]="activeSession?.id || null"
        (createSession)="handleCreateSession($event)"
        (selectSession)="handleSelectSession($event)"
        (deleteSession)="handleDeleteSession($event)"
        (clearAllSessions)="handleClearAllSessions()"
      ></app-session-manager>

      <app-settings-panel
        [apiKey]="apiKey"
        [projectPath]="projectPath"
        (saveApiKey)="handleSaveApiKey($event)"
        (saveProjectPath)="handleSaveProjectPath($event)"
        (reconnect)="connectToGodot()"
      ></app-settings-panel>
    </div>
  </main>
</div>
