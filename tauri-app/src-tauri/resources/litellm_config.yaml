# LiteLLM proxy configuration bundled with the app (no secrets on disk)
# Secrets are injected via environment variables by the Rust backend at runtime.

litellm_settings:
  # Require requests to include the LiteLLM master key set by the Rust backend
  master_key: ${LITELLM_MASTER_KEY}
  # Reduce logging/noise and retries
  num_retries: 2
  telemetry: false

model_list:
  # Route to OpenRouter using the user's API key from OS keychain
  - model_name: openrouter/anthropic/claude-3.5-sonnet
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_key: os.environ/OPENROUTER_API_KEY

  # Example local Ollama model
  - model_name: ollama/llama3.1
    litellm_params:
      model: ollama/llama3.1
      api_base: http://127.0.0.1:11434

  # Example local vLLM endpoint
  - model_name: vllm/qwen2.5-7b-instruct
    litellm_params:
      model: vllm/qwen2.5-7b-instruct
      api_base: http://127.0.0.1:8000

# Optional: map simple aliases to the above for nicer UI model names
model_alias_map:
  claude-sonnet: openrouter/anthropic/claude-3.5-sonnet
  llama3.1: ollama/llama3.1
  qwen2.5-7b: vllm/qwen2.5-7b-instruct

